<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Squid Game — Landing Page</title>
<link rel="stylesheet" href="style.css">
<link
  href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css"
  rel="stylesheet"
/>
</head>
<body>

<div class="page">

  <div class="watermark-game">GAME</div>
  <div class="watermark-squid">SQUID</div>

  <nav>
    <div class="logo-nav">
       <img src="https://image.tmdb.org/t/p/original/lifhjTPgcScJaEA6SpWJUKNJ1kt.png" alt="">
    </div>

    <div class="nav-links">
      <a href="#">About</a>
      <a href="#" class="active">Watch now</a>
      <a href="#">Actors</a>
      <a href="#">Contact</a>
    </div>

    <div class="menu-icon">☰</div>
  </nav>

  <div class="hero">

    <div class="hero-left">
      <div class="title-block">
        <img src="https://image.tmdb.org/t/p/original/lifhjTPgcScJaEA6SpWJUKNJ1kt.png" alt="">
      </div>

      <p class="meta">
        Action / Thriller / Drama Series directed by Dong-hyuk Hwang<br>
        Season 1: 9 Episodes
      </p>

      <div class="buttons">
        <a href="#" class="btn btn-play">
          <span class="icon">▶</span> Play Now
        </a>
        <a href="#" class="btn btn-trailer">
          ▶ Watch Trailer
        </a>
      </div>
    </div>

    <div class="hero-right">
      <div class="scroll-indicator">
        <span>SCROLL</span>
        <div class="line"></div>
      </div>

      <div class="character-img">
        <img src="./1.png" alt="Squid Game guard character">
      </div>

      <div class="socials">
       <i class="ri-twitter-line"></i>
        <i class="ri-instagram-line"></i>
        <i class="ri-facebook-box-fill"></i>
      </div>
    </div>

  </div>

  <div class="bottom-card">

    <div class="thumb">
      <img src="https://i.ytimg.com/vi/te6i5yE3e9Q/maxresdefault.jpg" alt="Squid Game players">
      <span class="thumb-title">SQUID GAME</span>
      <div class="play-btn">▶</div>
    </div>

    <div class="thumb">
      <img src="https://i.pinimg.com/200x150/95/2c/35/952c3511299488b0482772f33d2c0e57.jpg" alt="Squid Game masked guard">
      <div class="play-btn">▶</div>
    </div>

    <div class="thumb">
      <img src="https://encrypted-tbn1.gstatic.com/images?q=tbn:ANd9GcRYwUOFyPA0SC_8CNwAeWI8hQjv8NYulqE0A17pgHO-k5pNGqae" alt="Squid Game group scene">
      <div class="play-btn">▶</div>
    </div>

  </div>

</div>

</body>
</html>
